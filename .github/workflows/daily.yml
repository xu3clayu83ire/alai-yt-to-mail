name: Daily YouTube to Mail

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00（台灣時間 08:00）
  workflow_dispatch:        # 允許在 Actions 頁面手動觸發測試

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: yt-to-mail/requirements.txt

      - name: 安裝依賴套件
        run: pip install -r yt-to-mail/requirements.txt

      - name: 還原 Gmail token（從 Secret 注入）
        run: |
          mkdir -p yt-to-mail/.source
          echo '${{ secrets.GMAIL_TOKEN_JSON }}' > yt-to-mail/.source/gmail_token.json

      - name: 執行 yt-to-mail
        working-directory: yt-to-mail
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_URL: ${{ secrets.YOUTUBE_CHANNEL_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GMAIL_CREDENTIALS_PATH: .source/google_credentials_gmail.json
          GMAIL_TOKEN_PATH: .source/gmail_token.json
          DB_PATH: data/processed.db
        run: python src/main.py
