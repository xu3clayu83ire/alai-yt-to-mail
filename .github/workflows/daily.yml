name: Daily YouTube to Mail

on:
  schedule:
    - cron: '0 0 * * *'   # 每天 UTC 00:00（台灣時間 08:00）
  workflow_dispatch:        # 允許在 Actions 頁面手動觸發測試

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: 取出程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: 安裝依賴套件
        run: pip install -r requirements.txt

      - name: 還原 Gmail token 與 YouTube cookies（從 Secret 注入）
        env:
          YOUTUBE_COOKIES: ${{ secrets.YOUTUBE_COOKIES }}
          GMAIL_TOKEN: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          mkdir -p .source
          printf '%s' "$GMAIL_TOKEN" > .source/gmail_oath_token.json
          printf '%s' "$YOUTUBE_COOKIES" > .source/youtube_cookies.txt
          echo "cookies 行數：$(wc -l < .source/youtube_cookies.txt)"

      - name: 執行 yt-to-mail
        env:
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          YOUTUBE_CHANNEL_URL: ${{ secrets.YOUTUBE_CHANNEL_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          GMAIL_CREDENTIALS_PATH: .source/gmail_credentials.json
          GMAIL_TOKEN_PATH: .source/gmail_oath_token.json
          YOUTUBE_COOKIES_PATH: .source/youtube_cookies.txt
          DB_PATH: data/processed.db
        run: python -m src.main
